<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Court Manager</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div class="ico">⚖️</div>
    <div class="ttl">Court Manager</div>
    <div class="sub">Baghpat District Court</div>

    <input type="text" id="lid" placeholder="User ID">
    <input type="password" id="lpwd" placeholder="Password">

    <button id="lbtn" onclick="doLogin()">🔐 Login</button>
    <div id="lerr"></div>
  </div>
</div>

<!-- HEADER -->
<div id="app-hdr">
  <div id="app-hdr-title">
    ⚖️ Court Manager + 📁 Bundle Tracker 
    <span id="syncDot" class="off"></span>
  </div>

  <div id="tab-bar">
    <button class="tab-btn on" onclick="switchTab('cfm')">⚖️ Court Files</button>
    <button class="tab-btn" onclick="switchTab('bundle')">📁 Bundle</button>
  </div>
</div>

<!-- TAB 1 -->
<div class="tab-c on" id="cfm-tab">
<div class="cnt">

  <div class="sec">
    <h3>📅 Working Date</h3>
    <input type="date" id="workDate">
    <select id="versionSelect"></select>
  </div>

  <div class="dash">
    <div class="card">📁 Total<br><span id="totalCount">0</span></div>
    <div class="card">📤 Sent<br><span id="sentCount">0</span></div>
    <div class="card">📥 Received<br><span id="receivedCount">0</span></div>
    <div class="card" onclick="openOverdueModal()">⏰ Overdue<br><span id="overdueCount">0</span></div>
  </div>

  <div class="sec">
    <h3>📥 Excel Upload</h3>
    <input type="file" id="excelFile">
    <button class="btn" onclick="uploadExcel()">Upload Excel</button>
  </div>

  <div class="sec">
    <h3>🔍 Search</h3>
    <input type="text" id="searchBox">
  </div>

  <div class="twrap">
    <table id="cfmTable"></table>
  </div>

</div>
</div>

<!-- TAB 2 -->
<div class="tab-c" id="bundle-tab">
<div class="cnt">
  <h3>📁 Bundle Tracker</h3>
</div>
</div>

<!-- OVERDUE MODAL -->
<div class="modal" id="ovModal">
  <div class="msh">
    <div class="mt">⏰ Overdue Files</div>
    <div id="ovList"></div>
  </div>
</div>

<!-- NEXT DATE MODAL -->
<div class="modal center" id="ndModal">
  <div class="msh">
    <div class="mt">📅 Next Date</div>
    <input type="date" id="ndInput">

    <div>
      <button onclick="toggleJO('J')">Jail</button>
      <button onclick="toggleJO('O')">Old</button>
    </div>

    <button onclick="saveNextDate()">Save</button>
  </div>
</div>

<!-- SCANNER -->
<div id="scan-ov">
  <video id="scan-vid"></video>
</div>

<!-- JS FILES -->
<script src="db.js"></script>
<script src="firebase.js"></script>
<script src="cfm.js"></script>
<script src="bundle.js"></script>
<script src="scanner.js"></script>
<script src="app.js"></script>

</body>
</html>
